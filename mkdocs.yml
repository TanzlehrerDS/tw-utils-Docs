site_name: tw-utils Doku
site_description: Anleitungen und Hilfen für tw-utils — Tools für Die Stämme
site_url: https://docs.tw-utils.net/

theme:
  name: material
  language: de
  favicon: assets/logo.png
  features:
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Zu Dark Mode wechseln
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Zu Light Mode wechseln

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: de
          default: true
          name: Deutsch
          build: true
        - locale: en
          name: English
          build: true
          site_name: tw-utils Docs
          nav_translations:
            Startseite: Home
            Off-Planungstool: Nuke-Planning
            AG-Planungstool: Snob-Planning
            Zwischencleaner & Fake-UT: Cleaner and Fake-UT
            Der Leaderview: Leader-View
            Discordbot: Discordbot
            Allgemein: Overview
            "Tab 1: Daten & Vorbereitung": "Tab 1: Data & Preparations"
            "Tab 2: Angriffsplanung": "Tab 2: Nuke-Planning"
            "Tab 3: Fakeplanung": "Tab 3: Fake-Planning"
            "Tab 4: Berechnung": "Tab 4: Calculation"
            "Tab 1: AG-Meldungen": "Tab 1: Snob-Entries"
            "Tab 2: Zieldörfer": "Tab 2: Targets"
            "Tab 3: Einstellungen": "Tab 3: Settings"
            "Tab 4: Ergebnisübersicht": "Tab 4: Results Overview"
            XXX (Platzhalter): XXX (Placeholder)
            Mitglieder: Members
            Truppen: Troops
            Bunker-Info: Bunker-Info
            Planung: Planning
            Quick-Setup-Guide: Quick-Setup-Guide
            Account-Verifizierung: Account-Verification
            Benachrichtigungen: Notifications

nav:
  - Startseite: index.md
  - Off-Planungstool:
      - Allgemein: off-planner/allgemein.md
      - "Tab 1: Daten & Vorbereitung": off-planner/tab1-daten.md
      - "Tab 2: Angriffsplanung": off-planner/tab2-angriffsplanung.md
      - "Tab 3: Fakeplanung": off-planner/tab3-fakeplanung.md
      - "Tab 4: Berechnung": off-planner/tab4-berechnung.md
  - AG-Planungstool:
      - Allgemein: ag-planner/allgemein.md
      - "Tab 1: AG-Meldungen": ag-planner/tab1-ag-meldungen.md
      - "Tab 2: Zieldörfer": ag-planner/tab2-zieldoerfer.md
      - "Tab 3: Einstellungen": ag-planner/tab3-einstellungen.md
      - "Tab 4: Ergebnisübersicht": ag-planner/tab4-ergebnisuebersicht.md
  - Zwischencleaner & Fake-UT:
      - Allgemein: cleaner-fake-ut/allgemein.md
      - XXX (Platzhalter): cleaner-fake-ut/platzhalter.md
  - Der Leaderview:
      - Mitglieder: leader-view/mitglieder.md
      - Truppen: leader-view/truppen.md
      - Bunker-Info: leader-view/bunker-info.md
      - Planung: leader-view/planung.md
  - Discordbot:
      - Quick-Setup-Guide: discord-bot/quick-setup.md
      - Account-Verifizierung: discord-bot/verifizierung.md
      - Account-Sitting-System: discord-bot/sitting-system.md
      - Bunker-Information-System: discord-bot/bunker-info.md
      - Off/Deff/Snob-Search-System: discord-bot/search-system.md
      - Planning-System: discord-bot/planning-system.md
      - Benachrichtigungen: discord-bot/benachrichtigungen.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
