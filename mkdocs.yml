site_name: tw-utils Doku
site_description: Anleitungen und Hilfen für tw-utils — Tools für Die Stämme
site_url: https://docs.tw-utils.net/

theme:
  name: material
  language: de
  favicon: assets/logo.png
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Zu Dark Mode wechseln
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Zu Light Mode wechseln

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: de
          default: true
          name: Deutsch
          build: true
        - locale: en
          name: English
          build: true
          site_name: tw-utils Docs
          nav_translations:
            Startseite: Home
            Off-Planner: Off-Planner
            AG-Planner: AG-Planner
            ZWC-Planner: ZWC-Planner
            Discord-Bot: Discord Bot
            Einführung: Introduction
            Konfiguration: Configuration
            FAQ: FAQ

nav:
  - Startseite: index.md
  - Off-Planner:
      - off-planner/index.md
      - Einführung: off-planner/einfuehrung.md
      - Konfiguration: off-planner/konfiguration.md
      - FAQ: off-planner/faq.md
  - AG-Planner: ag-planner/index.md
  - ZWC-Planner: zwc-planner/index.md
  - Discord-Bot: discord-bot/index.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
