site_name: tw-utils Doku
site_description: Anleitungen und Hilfen für tw-utils — Tools für Die Stämme
site_url: https://docs.tw-utils.net/
repo_url: https://github.com/Tanzlehrer/tw-utils-Docs
repo_name: Tanzlehrer/tw-utils-Docs
edit_uri: edit/main/docs/

theme:
  name: material
  language: de
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Zu Dark Mode wechseln
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Zu Light Mode wechseln
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: de
          default: true
          name: Deutsch
          build: true
        - locale: en
          name: English
          build: true
          site_name: tw-utils Docs
          nav_translations:
            Startseite: Home
            Off-Planner: Off-Planner
            AG-Planner: AG-Planner
            ZWC-Planner: ZWC-Planner
            Discord-Bot: Discord Bot

nav:
  - Startseite: index.md
  - Off-Planner: off-planner/index.md
  - AG-Planner: ag-planner/index.md
  - ZWC-Planner: zwc-planner/index.md
  - Discord-Bot: discord-bot/index.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Tanzlehrer/tw-utils
